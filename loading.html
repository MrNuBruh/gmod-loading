<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Loading..</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
		:root {
			--accent: #e8c96a;
			--panel-bg: rgba(10, 12, 18, 0.72);
			--panel-border: rgba(255,255,255,0.08);
			--bottom-bg: rgba(8, 9, 14, 0.88);
			--text-primary: #f0ede6;
			--text-muted: rgba(240, 237, 230, 0.45);
			--bar-bg: rgba(255,255,255,0.10);
			--side-w: 410px;
			--bottom-h: 80px;
		}

		html, body {
			width: 100%; height: 100%;
			overflow: hidden;
			font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
			background-color: #0d0d10;
		}

		#bg {
			position: fixed; top: 0; left: 0; 
			right: var(--side-w); bottom: var(--bottom-h);
			background: #0d0d10 center/cover no-repeat;
		}
		
		#bg-blur { display: none; }
		#bg-blur.ready { opacity: 1; }

		#bg-dim {
			position: fixed; 
			top: 0; left: 0; 
			right: var(--side-w); 
			bottom: var(--bottom-h);
			background: rgba(0,0,0,0.48);
		}

		#layout {
			position: fixed; top: 0; left: 0; width: 100%; height: 100%;
		}

		#main {
			position: absolute;
			top: 0; left: 0;
			right: var(--side-w);
			bottom: var(--bottom-h);
			overflow: hidden;
		}
		#mapimg {
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			object-fit: cover;
			opacity: 0;
			transition: opacity 0.7s ease;
			object-position: center;
		}
		#mapimg.loaded { opacity: 1; }

		#mapimg.fallback {
			object-fit: contain;
			background: linear-gradient(180deg, #0e0a12 0%, #0b0b0d 100%);
		}
		
		#main::after {
			content: '';
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			background: linear-gradient(to right, transparent 60%, rgba(10,12,18,0.85) 100%);
			pointer-events: none;
		}

		#side {
			position: absolute;
			top: 0; right: 0;
			width: var(--side-w);
			bottom: var(--bottom-h);
			display: flex;
			flex-direction: column;
			background: var(--panel-bg);
			backdrop-filter: blur(22px) saturate(1.4);
			-webkit-backdrop-filter: blur(22px) saturate(1.4);
			border-left: 1px solid var(--panel-border);
		}

		#side-header {
			padding: 14px 18px 12px;
			border-bottom: 1px solid var(--panel-border);
			display: flex;
			align-items: center;
			justify-content: space-between;
			flex-shrink: 0;
		}

		#side-title {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--text-muted);
		}

		#player-count {
			font-size: 11px;
			color: var(--accent);
			font-variant-numeric: tabular-nums;
		}

		#player-list {
			flex: 1;
			overflow-y: auto;
			padding: 8px 0;
		}

		.player-row {
			display: flex;
			align-items: center;
			padding: 7px 18px;
			opacity: 0;
			transform: translateX(6px);
			animation: rowIn 0.3s ease forwards;
		}

		@keyframes rowIn {
			to { opacity: 1; transform: translateX(0); }
		}

		.player-avatar {
			width: 28px; height: 28px;
			border-radius: 4px;
			background: rgba(255,255,255,0.07);
			border: 1px solid var(--panel-border);
			flex-shrink: 0;
			overflow: hidden;
			margin-right: 10px;
		}
		.player-avatar img {
			width: 100%; height: 100%;
			object-fit: cover;
			display: block;
		}

		.player-name {
			font-size: 13px;
			color: var(--text-primary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}

		#no-players {
			padding: 24px 18px;
			font-size: 12px;
			color: var(--text-muted);
		}

		#tips-container {
			padding: 25px;
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#server-tip {
			color: var(--text-primary);
			font-size: 1.1rem;
			line-height: 1.6;
			text-align: center;
			font-style: italic;
			opacity: 1;
			transition: opacity 0.5s ease-in-out;
		}

		#bottom {
			position: absolute;
			bottom: 0; left: 0;
			width: 100%;
			height: var(--bottom-h);
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0 28px;
			background: var(--bottom-bg);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border-top: 1px solid var(--panel-border);
		}

		#bottom-info {
			display: flex;
			flex-direction: column;
			min-width: 0;
			margin-right: 32px;
		}

		#bottom-server {
			font-size: 14px;
			font-weight: 600;
			color: var(--text-primary);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-bottom: 3px;
		}

		#bottom-meta {
			display: flex;
			align-items: center;
			font-size: 12px;
			color: var(--text-muted);
		}

		#bottom-meta .sep {
			width: 3px; height: 3px;
			border-radius: 50%;
			background: var(--text-muted);
			opacity: 0.4;
			flex-shrink: 0;
			margin: 0 10px;
		}

		#serverMap {
			font-family: 'Consolas', 'Courier New', monospace;
			letter-spacing: 0.02em;
		}

		#bottom-progress {
			display: flex;
			flex-direction: column;
			min-width: 220px;
			max-width: 280px;
			flex-shrink: 0;
		}

		#progress-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 6px;
		}

		#status-text {
			font-size: 11px;
			color: var(--text-muted);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 180px;
		}

		#progress-pct {
			font-size: 11px;
			color: var(--accent);
			font-variant-numeric: tabular-nums;
			font-weight: bold;
			flex-shrink: 0;
		}

		#bar-track {
			width: 100%;
			height: 6px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 10px;
			overflow: hidden;
		}

		#bar-fill {
			height: 100%;
			width: 0%;
			background: var(--accent);
			box-shadow: 0 0 8px var(--accent);
			transition: width 0.4s ease-out;
		}
	</style>
</head>
<body>

<div id="bg"></div>
<div id="bg-blur"></div>
<div id="bg-dim"></div>

<div id="layout">
	<div id="main">
		<img id="mapimg" src="asset://mapimage/invalid_map" alt=""
		     onerror="useFallback();" />
	</div>

	<div id="side">
		<div id="side-header">
			<span id="side-title">Tips from the Server</span>
			<span id="player-count" style="color: var(--accent); font-size: 12px;">0 / 0</span>
		</div>
		<div id="tips-container">
			<p id="server-tip">Gathering useful information for your match...</p>
		</div>
	</div>

	<div id="bottom">
		<div id="bottom-info">
			<div id="bottom-server">Connecting...</div>
			<div id="bottom-meta">
				<span id="serverGamemode">Unknown</span>
				<span class="sep"></span>
				<span id="serverMap">—</span>
			</div>
		</div>

		<div id="bottom-progress">
			<div id="progress-row">
				<span id="status-text">Loading...</span>
				<span id="progress-pct">0%</span>
			</div>
			<div id="bar-track">
				<div id="bar-fill"></div>
			</div>
		</div>
	</div>
</div>

<script>
	var totalFiles = 0;
	var downloadedFiles = 0;
	var maxPlayers = 0;
	var actualTip = 0;

	var tipsChat = [
		"Loading resources from the server...",
		"Enjoy your stay!"
	];

	var tipsPorGamemode = {
	};

	var listOfTips = tipsChat;

	function rotatetips() {
		var textElement = document.getElementById('server-tip');
		if (!textElement) return;

		setInterval(function() {
			textElement.style.opacity = 0;

			setTimeout(function() {
				actualTip = (actualTip + 1) % listOfTips.length;
				textElement.innerHTML = listOfTips[actualTip];
				textElement.style.opacity = 1;
			}, 500);

		}, 7000);
	}

	function useFallback() {
		var img = document.getElementById('mapimg');
		img.src = 'fallback_map.jpg';
		img.classList.add('loaded');
		document.getElementById('bg').style.backgroundImage = "url('fallback_map.jpg')";
	}

	function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang, gamemodeNice) {
		maxPlayers = maxplayers;

		var elServer = document.getElementById('bottom-server');
		var elMap    = document.getElementById('serverMap');
		var elGm     = document.getElementById('serverGamemode');

		if (elServer) elServer.textContent = servername || 'Server';
		if (elMap)    elMap.textContent    = mapname    || '—';
		if (elGm)     elGm.textContent     = gamemodeNice || gamemode || 'Unknown';

		var mapImg = 'asset://mapimage/' + mapname;
		var img = document.getElementById('mapimg');

		img.onload = function() {
			if (this.naturalWidth === 0 || this.naturalHeight === 0) {
				useFallback();
				return;
			}

			try {
				var grayCount = 0;
				var canvas = document.createElement('canvas');
				canvas.width = 3; canvas.height = 3;
				var ctx = canvas.getContext('2d');
				ctx.drawImage(this, 0, 0, 3, 3);

				for (var sy = 0; sy < 3; sy++) {
					for (var sx = 0; sx < 3; sx++) {
						var px = ctx.getImageData(sx, sy, 1, 1).data;
						var r = px[0], g = px[1], b = px[2];
						var isGray = Math.abs(r-g) < 10 && Math.abs(g-b) < 10;
						var isDark = r < 85;
						if (isGray && isDark) grayCount++;
					}
				}

				if (grayCount === 9) {
					useFallback();
					return;
				}
			} catch(e) {}

			document.getElementById('bg').style.backgroundImage = "url('" + mapImg + "')";
			this.classList.add('loaded');
		};

		img.onerror = function() { useFallback(); };
		img.src = mapImg;

		var gmTips = tipsPorGamemode[gamemode] || [];
		listOfTips = gmTips.concat(tipsChat);
		listOfTips.sort(function() { return Math.random() - 0.5; });

		actualTip = 0;
		var tipEl = document.getElementById('server-tip');
		if (tipEl) tipEl.innerHTML = listOfTips[0];

		updatePlayerCount(0);
	}

	function SetFilesTotal(total) {
		totalFiles = Math.max(total, 1);
	}

	function SetFilesNeeded(needed) {
		downloadedFiles = Math.max(0, totalFiles - needed);
		updateProgress();
	}

	function updateProgress() {
		if (totalFiles <= 0) return;
		var pct = Math.min(100, Math.round((downloadedFiles / totalFiles) * 100));

		var fillEl = document.getElementById('bar-fill');
		var pctEl  = document.getElementById('progress-pct');

		var currentPct = parseInt(pctEl ? pctEl.textContent : '0') || 0;
		if (pct > currentPct) {
			if (fillEl) fillEl.style.width = pct + '%';
			if (pctEl)  pctEl.textContent  = pct + '%';
		}
	}

	function DownloadingFile(file) {
		var el = document.getElementById('status-text');
		if (el) el.textContent = 'Downloading: ' + file.replace(/^.*\//, '');
	}

	function SetStatusChanged(status) {
		var el = document.getElementById('status-text');
		if (el) el.textContent = status;

		if (status.toLowerCase().indexOf('workshop complete') !== -1 ||
		    status.toLowerCase().indexOf('client info sent') !== -1) {
			var fillEl = document.getElementById('bar-fill');
			var pctEl  = document.getElementById('progress-pct');
			if (fillEl) fillEl.style.width = '100%';
			if (pctEl)  pctEl.textContent  = '100%';
		}
	}

	function updatePlayerCount(count) {
		var el = document.getElementById('player-count');
		if (el) el.textContent = count + ' / ' + maxPlayers;
	}

	window.onload = function() {
		var tipEl = document.getElementById('server-tip');
		if (tipEl) tipEl.textContent = 'Gathering useful information for your match...';
		rotatetips();
	};
</script>

</body>
</html>
