<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Loading..</title>
	<style>
		*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

		html, body {
			width: 100%; height: 100%;
			overflow: hidden;
			font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
			background-color: #0d0d10;
		}

		#bg {
			position: fixed;
			top: 0; left: 0;
			right: 410px; bottom: 80px;
			background: #0d0d10 center/cover no-repeat;
		}

		#bg-dim {
			position: fixed;
			top: 0; left: 0;
			right: 410px; bottom: 80px;
			background: rgba(0,0,0,0.48);
		}

		#layout {
			position: fixed; top: 0; left: 0; width: 100%; height: 100%;
		}

		#main {
			position: absolute;
			top: 0; left: 0;
			right: 410px; bottom: 80px;
			overflow: hidden;
		}

		#mapimg {
			position: absolute;
			top: 0; left: 0;
			width: 100%; height: 100%;
			object-fit: cover;
			object-position: center;
			opacity: 0;
			transition: opacity 0.7s ease;
		}

		#mapimg.loaded { opacity: 1; }

		#mapimg.fallback {
			object-fit: contain;
			background: #0e0a12;
		}

		#main::after {
			content: '';
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			background: linear-gradient(to right, transparent 60%, rgba(10,12,18,0.85) 100%);
			pointer-events: none;
		}

		#side {
			position: absolute;
			top: 0; right: 0;
			width: 410px; bottom: 80px;
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-orient: vertical;
			-webkit-box-direction: normal;
			-ms-flex-direction: column;
			flex-direction: column;
			background: rgba(10, 12, 18, 0.94);
			border-left: 1px solid rgba(255,255,255,0.08);
		}

		#side-header {
			padding: 14px 18px 12px;
			border-bottom: 1px solid rgba(255,255,255,0.08);
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-align: center;
			-ms-flex-align: center;
			align-items: center;
			-webkit-box-pack: justify;
			-ms-flex-pack: justify;
			justify-content: space-between;
			-ms-flex-negative: 0;
			flex-shrink: 0;
		}

		#side-title {
			font-size: 11px;
			font-weight: 600;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: rgba(240, 237, 230, 0.45);
		}

		#player-count {
			font-size: 11px;
			color: #e8c96a;
		}

		#tips-container {
			padding: 25px;
			-webkit-box-flex: 1;
			-ms-flex: 1;
			flex: 1;
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-align: center;
			-ms-flex-align: center;
			align-items: center;
			-webkit-box-pack: center;
			-ms-flex-pack: center;
			justify-content: center;
		}

		#server-tip {
			color: #f0ede6;
			font-size: 1.1rem;
			line-height: 1.6;
			text-align: center;
			font-style: italic;
			opacity: 1;
			transition: opacity 0.5s ease-in-out;
		}

		#bottom {
			position: absolute;
			bottom: 0; left: 0;
			width: 100%; height: 80px;
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-align: center;
			-ms-flex-align: center;
			align-items: center;
			-webkit-box-pack: justify;
			-ms-flex-pack: justify;
			justify-content: space-between;
			padding: 0 28px;
			background: rgba(8, 9, 14, 0.96);
			border-top: 1px solid rgba(255,255,255,0.08);
		}

		#bottom-info {
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-orient: vertical;
			-webkit-box-direction: normal;
			-ms-flex-direction: column;
			flex-direction: column;
			min-width: 0;
			margin-right: 32px;
		}

		#bottom-server {
			font-size: 14px;
			font-weight: 600;
			color: #f0ede6;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			margin-bottom: 3px;
		}

		#bottom-meta {
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-align: center;
			-ms-flex-align: center;
			align-items: center;
			font-size: 12px;
			color: rgba(240, 237, 230, 0.45);
		}

		#bottom-meta .sep {
			width: 3px; height: 3px;
			border-radius: 50%;
			background: rgba(240, 237, 230, 0.45);
			opacity: 0.4;
			-ms-flex-negative: 0;
			flex-shrink: 0;
			margin: 0 10px;
		}

		#serverMap {
			font-family: 'Consolas', 'Courier New', monospace;
			letter-spacing: 0.02em;
		}

		#bottom-progress {
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-orient: vertical;
			-webkit-box-direction: normal;
			-ms-flex-direction: column;
			flex-direction: column;
			min-width: 220px;
			max-width: 280px;
			-ms-flex-negative: 0;
			flex-shrink: 0;
		}

		#progress-row {
			display: -webkit-box;
			display: -ms-flexbox;
			display: flex;
			-webkit-box-pack: justify;
			-ms-flex-pack: justify;
			justify-content: space-between;
			-webkit-box-align: center;
			-ms-flex-align: center;
			align-items: center;
			margin-bottom: 6px;
		}

		#status-text {
			font-size: 11px;
			color: rgba(240, 237, 230, 0.45);
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			max-width: 180px;
		}

		#progress-pct {
			font-size: 11px;
			color: #e8c96a;
			font-weight: bold;
			-ms-flex-negative: 0;
			flex-shrink: 0;
		}

		#bar-track {
			width: 100%;
			height: 6px;
			background: rgba(255,255,255,0.10);
			border-radius: 10px;
			overflow: hidden;
		}

		#bar-fill {
			height: 100%;
			width: 0%;
			background: #e8c96a;
			transition: width 0.4s ease-out;
		}
	</style>
</head>
<body>

<div id="bg"></div>
<div id="bg-dim"></div>

<div id="layout">
	<div id="main">
		<img id="mapimg" alt="" />
	</div>

	<div id="side">
		<div id="side-header">
			<span id="side-title">Tips from the Server</span>
			<span id="player-count">0 / 0</span>
		</div>
		<div id="tips-container">
			<p id="server-tip">Gathering useful information for your match...</p>
		</div>
	</div>

	<div id="bottom">
		<div id="bottom-info">
			<div id="bottom-server">Connecting...</div>
			<div id="bottom-meta">
				<span id="serverGamemode">Unknown</span>
				<span class="sep"></span>
				<span id="serverMap">—</span>
			</div>
		</div>

		<div id="bottom-progress">
			<div id="progress-row">
				<span id="status-text">Loading...</span>
				<span id="progress-pct">0%</span>
			</div>
			<div id="bar-track">
				<div id="bar-fill"></div>
			</div>
		</div>
	</div>
</div>

<script>
	var totalFiles = 0;
	var downloadedFiles = 0;
	var maxPlayers = 0;
	var actualTip = 0;

	var tipsChat = [
		"Loading resources from the server...",
		"Enjoy your stay!"
	];

	var tipsPorGamemode = {

	};

	var listOfTips = tipsChat;

	function rotatetips() {
		var textElement = document.getElementById('server-tip');
		if (!textElement) return;

		setInterval(function() {
			textElement.style.opacity = 0;
			setTimeout(function() {
				actualTip = (actualTip + 1) % listOfTips.length;
				textElement.innerHTML = listOfTips[actualTip];
				textElement.style.opacity = 1;
			}, 500);
		}, 7000);
	}

	function useFallback() {
		var img = document.getElementById('mapimg');
		img.onerror = null;
		img.onload = function() {
			this.className = 'loaded';
			document.getElementById('bg').style.backgroundImage = "url('fallback_map.jpg')";
		};
		img.src = 'fallback_map.jpg';
	}

	function GameDetails(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, lang, gamemodeNice) {
	    maxPlayers = maxplayers;
	
	    var elServer = document.getElementById('bottom-server');
	    var elMap    = document.getElementById('serverMap');
	    var elGm     = document.getElementById('serverGamemode');
	
	    if (elServer) elServer.textContent = servername || 'Server';
	    if (elMap)    elMap.textContent    = mapname    || '—';
	    if (elGm)     elGm.textContent     = gamemodeNice || gamemode || 'Unknown';
	
	    useFallback();
	
	    var gmTips = tipsPorGamemode[gamemode] || [];
	    listOfTips = gmTips.concat(tipsChat);
	    listOfTips.sort(function() { return Math.random() - 0.5; });
	
	    actualTip = 0;
	    var tipEl = document.getElementById('server-tip');
	    if (tipEl) tipEl.innerHTML = listOfTips[0];
	
	    updatePlayerCount(0);
	}

	function SetFilesTotal(total) {
		totalFiles = Math.max(total, 1);
	}

	function SetFilesNeeded(needed) {
		downloadedFiles = Math.max(0, totalFiles - needed);
		updateProgress();
	}

	function updateProgress() {
		if (totalFiles <= 0) return;
		var pct = Math.min(100, Math.round((downloadedFiles / totalFiles) * 100));

		var fillEl = document.getElementById('bar-fill');
		var pctEl  = document.getElementById('progress-pct');
		var currentPct = parseInt(pctEl ? pctEl.textContent : '0') || 0;

		if (pct > currentPct) {
			if (fillEl) fillEl.style.width = pct + '%';
			if (pctEl)  pctEl.textContent  = pct + '%';
		}
	}

	function DownloadingFile(file) {
		var el = document.getElementById('status-text');
		if (el) el.textContent = 'Downloading: ' + file.replace(/^.*\//, '');
	}

	function SetStatusChanged(status) {
		var el = document.getElementById('status-text');
		if (el) el.textContent = status;

		var lower = status.toLowerCase();
		if (lower.indexOf('workshop complete') !== -1 || lower.indexOf('client info sent') !== -1) {
			var fillEl = document.getElementById('bar-fill');
			var pctEl  = document.getElementById('progress-pct');
			if (fillEl) fillEl.style.width = '100%';
			if (pctEl)  pctEl.textContent  = '100%';
		}
	}

	function updatePlayerCount(count) {
		var el = document.getElementById('player-count');
		if (el) el.textContent = count + ' / ' + maxPlayers;
	}

	window.onload = function() {
	    useFallback();
	    var tipEl = document.getElementById('server-tip');
	    if (tipEl) tipEl.textContent = 'Gathering useful information for your match...';
	    rotatetips();
	};
</script>

</body>
</html>
